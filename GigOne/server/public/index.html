<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCP Any-to-English Speech Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #07080f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { max-width: 900px; width: 100%; text-align: center; }
        .status { margin-bottom: 20px; font-weight: bold; color: #00d4aa; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        #startBtn { background: #6c63ff; color: white; }
        #stopBtn { background: #ef4444; color: white; display: none; }
        button:hover { opacity: 0.9; }
        
        .box-container { display: flex; gap: 20px; margin-top: 20px; text-align: left; }
        .box { flex: 1; background: rgba(19, 22, 38, 0.75); padding: 20px; border-radius: 12px; min-height: 250px; border: 1px solid #333; font-size: 18px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; position: relative;}
        .box h3 { margin-top: 0; color: #00d4aa; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .lang-badge { position: absolute; top: 20px; right: 20px; background: #6c63ff; font-size: 12px; padding: 4px 8px; border-radius: 12px; font-weight: bold;}
        
        .interim { color: #a1a1aa; font-style: italic; }
        .final { color: white; }
        .translation { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Any Language ➔ English Translation</h1>
        <p>Speak in English, Hindi, Bengali, Tamil, Telugu, etc., and it will auto-detect and translate to English.</p>
        <div class="status" id="status">Click Start to record</div>
        
        <button id="startBtn">▶ Start Recording</button>
        <button id="stopBtn">⏹ Stop Recording</button>

        <div class="box-container">
            <div class="box">
                <h3>Original Speech</h3>
                <div id="transcript"></div>
            </div>
            <div class="box">
                <h3>English Translation</h3>
                <div id="translation"></div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');
        const translationEl = document.getElementById('translation');

        let ws = null;
        let audioContext = null;
        let processor = null;
        let globalStream = null;
        
        let finalTranscripts = [];
        let finalTranslations = [];
        let interimTranscript = '';

        function updateDisplay() {
            // Update Transcript (Original Language)
            transcriptEl.innerHTML = 
                finalTranscripts.map(t => `<span class="final">${t.text} <span style="font-size: 12px; color: #6c63ff;">[${t.lang}]</span></span>`).join('<br><br>') +
                (interimTranscript ? `<br><span class="interim">${interimTranscript}</span>` : '');

            // Update Translation Box
            translationEl.innerHTML = 
                finalTranslations.map(t => `<span class="translation">${t}</span>`).join('<br><br>');
        }

        startBtn.onclick = async () => {
            try {
                // Connect WebSocket
                ws = new WebSocket(`ws://${location.host}/api/speech`);

                ws.onopen = async () => {
                    statusEl.innerText = "Listening... Auto-detecting language.";
                    startBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    globalStream = stream;

                    audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000 
                    });

                    const source = audioContext.createMediaStreamSource(stream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);
                    
                    source.connect(processor);
                    processor.connect(audioContext.destination);

                    processor.onaudioprocess = (e) => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            const inputData = e.inputBuffer.getChannelData(0);
                            const outputData = new Int16Array(inputData.length);
                            for (let i = 0; i < inputData.length; i++) {
                                outputData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                            }
                            ws.send(outputData.buffer);
                        }
                    };
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.error) {
                        statusEl.innerText = "Error: " + data.error;
                        statusEl.style.color = "#ef4444";
                        return;
                    }

                    if (data.isFinal) {
                        finalTranscripts.push({ text: data.transcript, lang: data.detectedLanguage });
                        if (data.translation) {
                            finalTranslations.push(data.translation);
                        }
                        interimTranscript = ''; // Reset interim
                    } else {
                        interimTranscript = data.transcript;
                    }
                    
                    updateDisplay();
                };

                ws.onerror = (error) => {
                    console.error('WebSocket Error:', error);
                    statusEl.innerText = "Connection error.";
                };

                ws.onclose = () => {
                    stopRecording();
                }

            } catch (err) {
                console.error("Microphone Access Error:", err);
                statusEl.innerText = "Microphone access denied or error occurred.";
            }
        };

        function stopRecording() {
            if (processor && audioContext) {
                processor.disconnect();
                audioContext.close();
            }
            if (globalStream) {
                globalStream.getTracks().forEach(track => track.stop());
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
            
            processor = null;
            audioContext = null;
            globalStream = null;
            
            statusEl.innerText = "Recording stopped.";
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }

        stopBtn.onclick = stopRecording;
    </script>
</body>
</html>
